<!DOCTYPE html>
<html lang="en">
<head>
    <title>Users</title>
    {% load static %}
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-dark text-light">

<!-- NAVBAR -->
<nav class="navbar navbar-dark bg-black px-4">
    <span class="navbar-brand">OTT Admin</span>
    <a href="#" class="btn btn-outline-light btn-sm">Logout</a>
</nav>

<!-- SEARCH BAR -->
<div class="container mt-4">
    <div class="row mb-3">
        <div class="col-md-4">
            <input type="text" class="form-control bg-secondary text-light border-0"
                   placeholder="Search users...">
        </div>
    </div>

    <!-- USERS TABLE -->
    <div class="card bg-secondary text-light shadow">
        <div class="card-body">
            <table class="table table-dark table-hover align-middle mb-0">
                <thead>
                    <tr>
                        <th>SI No</th>
                        <th>Username</th>
                        <th>Block / Unblock</th>
                        <th>History</th>
                    </tr>
                </thead>
                <tbody>
                    {% for user in users %}
                    <tr>
                        <td>{{ forloop.counter }}</td>
                        <td>{{ user.username }}</td>

                        <!-- TOGGLE BUTTON -->
                        <td>
                            {% if user.is_blocked %}
                                <button class="btn btn-success btn-sm">
                                    Unblock
                                </button>
                            {% else %}
                                <button class="btn btn-danger btn-sm">
                                    Block
                                </button>
                            {% endif %}
                        </td>

                        <!-- VIEW HISTORY -->
                        <td>
                            <button class="btn btn-info btn-sm">
                                View History
                            </button>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>

    <!-- PAGINATION -->
    <div class="d-flex justify-content-end mt-3">
        <nav>
            <ul class="pagination pagination-sm">
                <li class="page-item disabled">
                    <a class="page-link">Previous</a>
                </li>
                <li class="page-item active">
                    <a class="page-link">1</a>
                </li>
                <li class="page-item">
                    <a class="page-link">2</a>
                </li>
                <li class="page-item">
                    <a class="page-link">Next</a>
                </li>
            </ul>
        </nav>
    </div>
</div>

</body>
</html>
