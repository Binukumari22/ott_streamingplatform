<!DOCTYPE html>
<html>
<head>
    <title>Movie Details</title>

    {% load static %}

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">

    <link rel="stylesheet" href="{% static 'style.css' %}">
</head>
<body>

<!-- Same Navbar -->
<nav class="navbar navbar-dark">
    <span class="navbar-brand">OTT Admin Panel</span>
    <button class="btn btn-outline-light btn-sm">Logout</button>
</nav>

<div class="container mt-5">

    <div class="card bg-dark text-white p-4">
        <div class="row">

            <!-- Movie Image -->
            <div class="col-md-4">
                <img src="{% static 'images/sample_movie.jpg' %}"
                     class="img-fluid rounded"
                     alt="Movie Image">
            </div>

            <!-- Movie Info -->
            <div class="col-md-8">
                <h3>Inception</h3>
                <hr style="background-color: #555;">

                <p>
                    Inception is a science fiction thriller that explores the
                    concept of dreams within dreams. A skilled thief is given
                    a chance at redemption if he can successfully perform
                    inception.
                </p>

                <a href="{% url 'movies_list' %}" class="btn btn-secondary mt-3">
                    ← Back to Movies List
                </a>
            </div>

        </div>
    </div>

</div>

</body>
</html>
