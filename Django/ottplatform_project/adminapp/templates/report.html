<!DOCTYPE html>
<html lang="en">
<head>
    <title>Reports</title>
    {% load static %}
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-dark text-light">

<!-- NAVBAR -->
<nav class="navbar navbar-dark bg-black px-4">
    <span class="navbar-brand">OTT Admin</span>
    <a href="#" class="btn btn-outline-light btn-sm">Logout</a>
</nav>

<div class="container mt-4">

    <!-- PAGE TITLE -->
    <h4 class="mb-3">Most Watched Movies</h4>

    <!-- REPORT TABLE -->
    <div class="card bg-secondary text-light shadow">
        <div class="card-body">
            <table class="table table-dark table-hover mb-0">
                <thead>
                    <tr>
                        <th>SI No</th>
                        <th>Movie Name</th>
                        <th>Watch Count</th>
                    </tr>
                </thead>
                <tbody>
                    {% for r in reports %}
                    <tr>
                        <td>{{ forloop.counter }}</td>
                        <td>{{ r.movie }}</td>
                        <td>
                            <span class="badge bg-info text-dark">
                                {{ r.count }}
                            </span>
                        </td>
                    </tr>
                    {% empty %}
                    <tr>
                        <td colspan="3" class="text-center text-muted">
                            No report data available
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>

    <!-- PAGINATION -->
    <div class="d-flex justify-content-end mt-3">
        <nav>
            <ul class="pagination pagination-sm">
                <li class="page-item disabled">
                    <a class="page-link">Previous</a>
                </li>
                <li class="page-item active">
                    <a class="page-link">1</a>
                </li>
                <li class="page-item">
                    <a class="page-link">2</a>
                </li>
                <li class="page-item">
                    <a class="page-link">Next</a>
                </li>
            </ul>
        </nav>
    </div>

</div>

</body>
</html>
