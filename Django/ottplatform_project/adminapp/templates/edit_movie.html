{% extends "navbar.html" %}

{% block title %}Edit Movie{% endblock %}

{% block content %}

<div class="container mt-4">

    <h4 class="mb-4 text-white">Edit Movie</h4>

    <div class="card bg-secondary text-light shadow">
        <div class="card-body">

            <form method="POST" enctype="multipart/form-data">
                {% csrf_token %}

                <!-- MOVIE TITLE -->
                <div class="mb-3">
                    <label class="form-label">Movie Title</label>
                    <input type="text"
                           name="title"
                           value="{{ movie.title }}"
                           class="form-control bg-dark text-light border-0">
                </div>

                <!-- GENRE -->
                <div class="mb-3">
                    <label class="form-label">Genre</label>
                    <input type="text"
                           name="genre"
                           value="{{ movie.genre }}"
                           class="form-control bg-dark text-light border-0">
                </div>

                <!-- DESCRIPTION -->
                <div class="mb-3">
                    <label class="form-label">Description</label>
                    <textarea name="description"
                              rows="4"
                              class="form-control bg-dark text-light border-0">{{ movie.description }}</textarea>
                </div>

                <!-- CURRENT IMAGE PREVIEW -->
                <div class="mb-3">
                    <label class="form-label">Current Poster</label><br>
                    {% if movie.thumbnail %}
                        <img src="{{ movie.thumbnail.url }}"
                             style="width:120px"
                             class="img-thumbnail mb-2">
                    {% else %}
                        <p class="text-muted">No image</p>
                    {% endif %}
                </div>

                <!-- IMAGE -->
                <div class="mb-3">
                    <label class="form-label">Change Poster</label>
                    <input type="file"
                           name="thumbnail"
                           class="form-control bg-dark text-light border-0">
                </div>

                <!-- VIDEO -->
                <div class="mb-4">
                    <label class="form-label">Change Video</label>
                    <input type="file"
                           name="video"
                           class="form-control bg-dark text-light border-0">
                </div>

                <!-- FEATURED -->
                <div class="mb-3 form-check">
                    <input type="checkbox"
                           name="featured"
                           class="form-check-input"
                           id="featuredCheck"
                           {% if movie.featured %}checked{% endif %}>
                    <label class="form-check-label" for="featuredCheck">
                        Mark as Featured Movie
                    </label>
                </div>

                <!-- BUTTONS -->
                <div class="d-flex justify-content-end">
                    <a href="{% url 'movies' %}" class="btn btn-outline-light me-2">
                        Cancel
                    </a>
                    <button type="submit" class="btn btn-warning">
                        Update Movie
                    </button>
                </div>

            </form>

        </div>
    </div>

</div>

{% endblock %}
